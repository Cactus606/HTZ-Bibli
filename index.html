<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTZ BIBLI — Ma Collection</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2F3F8;
  --white:#FFFFFF;
  --surface:#F0F1F8;
  --surface2:#E2E4F0;
  --ink:#111827;
  --ink2:#374151;
  --muted:#8B90A7;
  --border:#DDE0EE;
  --violet:#1B6EF3;
  --violet-light:#E8F0FE;
  --acid:#22C55E;
  --acid-light:#DCFCE7;
  --coral:#FF4F6A;
  --coral-light:#FFF0F2;
  --amber:#FF6B00;
  --amber-light:#FFF0E6;
  --cyan:#00B8D4;
  --cyan-light:#E4F8FC;
  --pink:#FF6B9D;
  --shadow:0 2px 12px rgba(27,110,243,.06);
  --shadow-lg:0 8px 28px rgba(27,110,243,.13);
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'DM Sans',sans-serif;display:flex;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:2px}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto;z-index:50}
.sidebar-logo{padding:22px 20px 18px;font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:22px;letter-spacing:-1px;color:var(--ink);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-badge{width:36px;height:36px;background:var(--violet);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 4px 12px rgba(27,110,243,.35);flex-shrink:0}
.logo-text{line-height:1}
.logo-text small{display:block;font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.5px;margin-top:1px}
.sidebar-section{padding:10px 10px 6px}
.sidebar-section-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:all .18s;font-size:14px;font-weight:500;color:var(--ink2);text-decoration:none;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface);color:var(--ink)}
.nav-item.active{background:var(--violet-light);color:var(--violet);font-weight:600}
.nav-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;transition:all .18s}
.nav-item.active .nav-icon{background:var(--violet);box-shadow:0 3px 10px rgba(27,110,243,.3)}
.nav-badge{margin-left:auto;background:var(--violet-light);color:var(--violet);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;min-width:24px;text-align:center}
.nav-item.active .nav-badge{background:var(--violet);color:#fff}
.pal-badge{background:var(--amber-light);color:var(--amber)}
.nav-item.active .pal-badge{background:var(--amber);color:#fff}
.sidebar-divider{height:1px;background:var(--border);margin:6px 14px}
.mini-stats{padding:10px 10px}
.mini-stat-card{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;background:var(--surface);margin-bottom:5px}
.mini-stat-icon{font-size:17px;flex-shrink:0}
.mini-stat-label{font-size:11px;color:var(--muted);line-height:1}
.mini-stat-val{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;color:var(--ink);line-height:1;margin-top:1px}
.genre-pill-list{display:flex;flex-direction:column;gap:2px;padding:0 10px}
.genre-pill{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink2);transition:all .15s;border:none;background:none;width:100%;text-align:left}
.genre-pill:hover{background:var(--surface);color:var(--ink)}
.genre-pill.active{background:var(--violet-light);color:var(--violet);font-weight:600}
.genre-n{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--muted);background:var(--surface2);border-radius:20px;padding:1px 7px}
.genre-pill.active .genre-n{background:var(--violet);color:#fff}
.sidebar-bottom{margin-top:auto;padding:14px}
.btn-add-main{width:100%;padding:12px;background:var(--violet);border:none;border-radius:12px;color:#fff;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(27,110,243,.35)}
.btn-add-main:hover{background:#1558CC;transform:translateY(-1px);box-shadow:0 6px 20px rgba(27,110,243,.4)}

/* ── MAIN ── */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:13px 26px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:40}
.search-wrap{position:relative;flex:1;max-width:400px}
.search-input{width:100%;padding:10px 38px 10px 38px;background:var(--surface);border:2px solid transparent;border-radius:12px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.search-input:focus{background:var(--white);border-color:var(--violet);box-shadow:0 0 0 4px rgba(27,110,243,.1)}
.search-input::placeholder{color:var(--muted)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;cursor:pointer;display:none}
.filter-chips{display:flex;gap:5px}
.fchip{padding:7px 14px;border-radius:40px;border:2px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;white-space:nowrap}
.fchip:hover{border-color:var(--violet-light);color:var(--ink)}
.fchip.active{border-color:var(--violet);background:var(--violet-light);color:var(--violet);font-weight:600}
.fchip.manga.active{border-color:#5B9BFF;background:#E8F0FE;color:#6C47FF}
.fchip.bd.active{border-color:var(--cyan);background:var(--cyan-light);color:var(--cyan)}
.fchip.comics.active{border-color:var(--coral);background:var(--coral-light);color:var(--coral)}
.sort-sel{padding:8px 12px;background:var(--surface);border:2px solid transparent;border-radius:12px;color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;outline:none;transition:border .2s}
.sort-sel:focus{border-color:var(--violet)}
.topbar-actions{display:flex;gap:6px;margin-left:auto}
.icon-btn{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:var(--white);color:var(--ink2);font-size:15px;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-light)}

/* ── CONTENT ── */
.content-wrap{flex:1;padding:22px 26px;overflow-y:auto}

/* ── ALPHA ── */
.alpha-bar{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:18px}
.alpha-btn{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:var(--white);color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.alpha-btn:hover{border-color:var(--violet);color:var(--violet)}
.alpha-btn.active{background:var(--violet);border-color:var(--violet);color:#fff;box-shadow:0 2px 8px rgba(27,110,243,.3)}
.alpha-btn.off{opacity:.2;pointer-events:none}
.alpha-sep{width:1px;background:var(--border);margin:3px 2px}
.alpha-section-head{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:800;color:#A0C4FF;letter-spacing:-1px;margin:18px 0 8px;border-bottom:2px solid #BFDBFE;padding-bottom:5px}

/* ── SERIES CARD ── */
.series-list{display:flex;flex-direction:column;gap:9px}
.sc{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .22s;box-shadow:var(--shadow)}
.sc:hover{border-color:var(--violet-light);box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.sc.open{border-color:var(--violet-light)}
.sc-head{display:flex;align-items:center;gap:13px;padding:13px 15px;cursor:pointer;user-select:none}
.sc-cover{width:44px;height:60px;border-radius:7px;flex-shrink:0;overflow:hidden}
.sc-cover img{width:100%;height:100%;object-fit:cover}
.sc-cover-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:7px}
.sc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.sc-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}
.sc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.type-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:5px}
.type-tag.Manga{background:#E8F0FE;color:#6C47FF}
.type-tag.BD{background:var(--cyan-light);color:var(--cyan)}
.type-tag.Comics{background:var(--coral-light);color:var(--coral)}
.sc-author{font-size:12px;color:var(--muted)}
.sc-genre{font-size:12px;color:var(--muted)}
.sc-prog{display:flex;align-items:center;gap:8px}
.prog-track{flex:1;height:6px;background:var(--surface2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.34,1.2,.64,1)}
.prog-label{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;white-space:nowrap}
.sc-right{display:flex;flex-direction:column;align-items:flex-end;gap:7px;flex-shrink:0;padding-left:6px}
.sc-stars{display:flex;gap:1px}
.sc-star{font-size:16px;line-height:1;cursor:pointer;transition:transform .15s;filter:grayscale(1);opacity:.2}
.sc-star.on{filter:none;opacity:1}
.sc-star:hover{transform:scale(1.3)}
.sc-star.on:hover{transform:scale(1.15)}
.sc-chevron{font-size:11px;color:var(--muted);transition:transform .22s;display:inline-block}
.sc.open .sc-chevron{transform:rotate(180deg)}
.sc-body{border-top:1.5px solid var(--border);padding:13px 15px;display:none;background:#F7F8FD}
.sc.open .sc-body{display:block}
.sc-body-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.tome-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.t{width:36px;height:48px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .18s;position:relative;border:2px solid var(--border);background:var(--white);color:var(--muted);flex-shrink:0}
.t:hover{border-color:var(--violet);color:var(--violet);transform:scale(1.08)}
.t.owned{color:#fff;border-color:transparent}
.t.owned:hover{transform:scale(1.1);filter:brightness(1.1)}
.t.read::after{content:'✓';position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--acid);color:#1a1a1a;font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:900;border:2px solid var(--white)}
.sc-actions{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.btn-xs{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--ink2);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:4px}
.btn-xs:hover{border-color:var(--violet);color:var(--violet);background:var(--violet-light)}
.btn-xs.v{background:var(--violet);border-color:var(--violet);color:#fff}
.btn-xs.v:hover{background:#1558CC}
.btn-xs.d{border-color:var(--coral-light);color:var(--coral)}
.btn-xs.d:hover{background:var(--coral-light)}
.btn-xs.g{border-color:var(--acid-light);color:var(--acid)}
.btn-xs.g:hover{background:var(--acid-light)}
.total-inline{display:flex;align-items:center;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.total-inline label{font-size:12px;color:var(--muted);font-weight:500}
.total-input{width:68px;padding:6px 10px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-align:center;outline:none;transition:border .2s}
.total-input:focus{border-color:var(--violet)}

/* ── PAL VIEW ── */
.pal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.pal-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:800;color:var(--ink)}
.pal-subtitle{font-size:13px;color:var(--muted);margin-top:2px}
.pal-list{display:flex;flex-direction:column;gap:8px}
.pal-item{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:grab}
.pal-item:hover{border-color:var(--violet-light);box-shadow:var(--shadow)}
.pal-item.dragging{opacity:.5;cursor:grabbing;transform:scale(.98)}
.pal-item.drag-over{border-color:var(--violet);background:var(--violet-light)}
.pal-rank{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:800;color:var(--surface2);width:36px;flex-shrink:0;text-align:center}
.pal-rank.r1{color:var(--amber)}
.pal-rank.r2{color:#A0A8B8}
.pal-rank.r3{color:#C87B35}
.pal-cover{width:36px;height:50px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.pal-info{flex:1;min-width:0}
.pal-name{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pal-meta{font-size:11px;color:var(--muted);margin-top:2px}
.pal-unread{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.pal-drag-handle{color:var(--muted);font-size:16px;cursor:grab;padding:0 4px;user-select:none;flex-shrink:0}
.pal-rank-input{width:44px;padding:5px 4px;background:var(--surface);border:1.5px solid var(--border);border-radius:7px;color:var(--ink);font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;text-align:center;outline:none;transition:border .2s;flex-shrink:0}
.pal-rank-input:focus{border-color:var(--violet)}

/* ── STATS ── */
.stats-hero{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px;margin-bottom:20px}
.stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:16px 14px;box-shadow:var(--shadow);transition:transform .2s;position:relative;overflow:hidden}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-card-icon{font-size:24px;margin-bottom:7px}
.stat-card-val{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:3px}
.stat-card-label{font-size:11px;color:var(--muted);font-weight:500}
.stat-card-sub{font-size:11px;font-weight:600;margin-top:5px}
.stat-card-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-box{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);padding:18px;box-shadow:var(--shadow)}
.chart-box.full{grid-column:1/-1}
.chart-box-title{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.bar-label{font-size:12px;color:var(--ink2);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:7px;background:var(--surface);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .8s cubic-bezier(.34,1.1,.64,1)}
.bar-n{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--muted);width:22px;text-align:right}
.donut-wrap{display:flex;align-items:center;gap:20px}
.donut-legend{display:flex;flex-direction:column;gap:9px}
.dleg{display:flex;align-items:center;gap:7px;font-size:12px}
.dleg-sq{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.dleg-pct{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--muted)}
.top-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--border)}
.top-row:last-child{border:none;padding-bottom:0}
.top-rank{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:800;color:var(--surface2);width:24px;flex-shrink:0}
.r1{color:#F0C040}.r2{color:#A0A8B8}.r3{color:#C87B35}
.top-info{flex:1;min-width:0}
.top-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.top-sub{font-size:11px;color:var(--muted);margin-top:1px}
.top-val{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;color:var(--ink)}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:7px}
.comp-row{display:flex;align-items:center;gap:9px;padding:8px 11px;background:var(--surface);border-radius:8px}
.comp-name{flex:1;font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.comp-bar{width:65px;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;flex-shrink:0}
.comp-fill{height:100%;border-radius:3px}
.comp-pct{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(17,24,39,.5);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:20px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(17,24,39,.18);transform:scale(.96) translateY(8px);transition:transform .25s cubic-bezier(.34,1.3,.64,1);border:1.5px solid var(--border)}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal.wide{max-width:680px}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;border-radius:20px 20px 0 0}
.modal-title{font-family:'Space Grotesk',sans-serif;font-weight:800;font-size:18px;color:var(--ink)}
.modal-close{width:30px;height:30px;border-radius:50%;background:var(--surface);border:none;color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:var(--coral-light);color:var(--coral)}
.modal-body{padding:18px 22px}
.modal-foot{padding:13px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;position:sticky;bottom:0;background:var(--white);border-radius:0 0 20px 20px}
.field{margin-bottom:13px}
.field>label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;padding:9px 13px;background:var(--surface);border:1.5px solid transparent;border-radius:10px;color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:all .2s}
.field input:focus,.field select:focus,.field textarea:focus{background:var(--white);border-color:var(--violet);box-shadow:0 0 0 4px rgba(27,110,243,.1)}
.field textarea{min-height:65px;resize:vertical}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.stars-big{display:flex;gap:7px;padding:4px 0}
.star-big{font-size:30px;cursor:pointer;filter:grayscale(1);opacity:.2;transition:all .15s;line-height:1}
.star-big.on{filter:none;opacity:1}
.star-big:hover{transform:scale(1.2)}
.star-big.on:hover{transform:scale(1.1) rotate(-5deg)}
.color-row{display:flex;gap:7px;flex-wrap:wrap}
.cswatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.cswatch:hover{transform:scale(1.2)}
.cswatch.sel{border-color:var(--ink);box-shadow:0 0 0 2px rgba(240,238,248,.3)}
.section-sep{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:16px 0 11px;padding-bottom:7px;border-bottom:1px solid var(--border)}
.btn-modal{padding:9px 20px;border-radius:11px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-cancel{background:var(--surface);color:var(--muted)}
.btn-cancel:hover{color:var(--ink)}
.btn-save{background:var(--violet);color:#fff;box-shadow:0 4px 12px rgba(27,110,243,.3)}
.btn-save:hover{background:#1558CC;transform:translateY(-1px)}

/* DETAIL */
.detail-cover-wrap{width:100%;height:180px;border-radius:12px;overflow:hidden;margin-bottom:14px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:68px}
.detail-cover-wrap img{width:100%;height:100%;object-fit:cover}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:12px 0}
.detail-cell{background:var(--surface);border-radius:9px;padding:9px 13px}
.detail-cell-label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.detail-cell-val{font-size:13px;font-weight:600;color:var(--ink)}
.detail-cell-sub{font-size:11px;color:var(--muted);margin-top:1px}
.note-box{background:var(--surface);border-radius:9px;padding:11px 13px;font-size:13px;color:var(--ink2);line-height:1.6;font-style:italic}
.vo-vf-row{display:flex;gap:7px}
.vo-vf-badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 8px;border-radius:6px}
.vo-badge{background:rgba(0,184,212,.15);color:var(--cyan)}
.vf-badge{background:rgba(27,110,243,.15);color:#5B9BFF}

/* EMPTY */
.empty{text-align:center;padding:70px 24px;color:var(--muted)}
.empty-ico{font-size:56px;margin-bottom:14px;display:block}
.empty h3{font-family:'Space Grotesk',sans-serif;font-size:20px;color:var(--ink);margin-bottom:7px}
.empty p{font-size:13px;max-width:260px;margin:0 auto 18px}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--white);border:1.5px solid var(--border);color:var(--ink);padding:11px 16px;border-radius:13px;font-size:13px;font-weight:500;z-index:9999;transform:translateY(80px);opacity:0;transition:all .3s cubic-bezier(.34,1.3,.64,1);pointer-events:none;display:flex;align-items:center;gap:8px;box-shadow:0 8px 30px rgba(17,24,39,.1)}
.toast.show{transform:translateY(0);opacity:1}
.toast-stripe{width:4px;height:34px;border-radius:4px;flex-shrink:0}

/* CONFETTI */
@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(90vh) rotate(540deg);opacity:0}}
.cf{position:fixed;pointer-events:none;z-index:9998;border-radius:2px;animation:cf linear forwards}
mark{background:rgba(27,110,243,.15);color:#5B9BFF;border-radius:3px;padding:0 2px}

/* ── HERO BANNER ── */
.hero{
  background:var(--white);
  border-bottom:2px solid var(--border);
  padding:0;
  overflow:hidden;
  position:relative;
  flex-shrink:0;
}
.hero-inner{
  display:flex;
  align-items:stretch;
  min-height:130px;
  position:relative;
  z-index:1;
}
/* halftone dot pattern */
.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background-image:radial-gradient(circle, rgba(27,110,243,.12) 1.5px, transparent 1.5px);
  background-size:18px 18px;
  z-index:0;
}
/* diagonal accent slash */
.hero-slash{
  position:absolute;
  top:-40px;right:200px;
  width:320px;height:260px;
  background:linear-gradient(135deg, rgba(27,110,243,.07) 0%, transparent 60%);
  transform:skewX(-12deg);
  z-index:0;
}
.hero-left{
  padding:22px 28px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  flex:1;
  min-width:0;
  position:relative;
  z-index:1;
}
.hero-eyebrow{
  font-family:'Space Grotesk',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:2.5px;text-transform:uppercase;
  color:var(--violet);
  display:flex;align-items:center;gap:6px;
  margin-bottom:6px;
}
.hero-eyebrow::before{content:'';width:20px;height:2px;background:var(--violet);border-radius:2px}
.hero-title{
  font-family:'Space Grotesk',sans-serif;
  font-weight:800;
  font-size:36px;
  letter-spacing:-2px;
  line-height:.95;
  color:var(--ink);
  margin-bottom:8px;
  white-space:nowrap;
}
.hero-title .accent{
  color:var(--violet);
  position:relative;
  display:inline-block;
}
/* speech-bubble underline on accent */
.hero-title .accent::after{
  content:'';
  position:absolute;
  left:0;bottom:-3px;right:0;
  height:4px;
  background:var(--violet);
  border-radius:2px;
  opacity:.3;
}
.hero-sub{
  font-size:13px;color:var(--muted);font-weight:400;
  margin-top:4px;
}
/* KPI pills */
.hero-kpis{
  display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;
}
.hero-kpi{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:40px;
  padding:5px 12px;
  font-family:'Space Grotesk',sans-serif;
  font-size:12px;font-weight:700;
  color:var(--ink);
  white-space:nowrap;
}
.hero-kpi-icon{font-size:14px}
.hero-kpi-val{color:var(--violet)}
/* right graphic panel */
.hero-right{
  width:240px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;
  padding:16px 24px 16px 0;
  gap:8px;
}
.hero-stack{
  display:flex;
  align-items:flex-end;
  gap:-4px;
  position:relative;
}
/* stacked book spines */
.hbook{
  width:28px;
  border-radius:5px 5px 4px 4px;
  position:relative;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:4px;
  box-shadow:2px 2px 8px rgba(0,0,0,.15);
  transition:transform .2s;
  cursor:default;
  flex-shrink:0;
}
.hbook:hover{transform:translateY(-8px) scale(1.05)}
.hbook-num{
  font-family:'Space Grotesk',sans-serif;
  font-size:9px;font-weight:800;
  color:rgba(255,255,255,.8);
  writing-mode:vertical-rl;
  text-orientation:mixed;
  letter-spacing:1px;
  line-height:1;
}
/* speech bubble badge */
.hero-bubble{
  position:absolute;
  top:-12px;right:-14px;
  background:#FF6B00;
  color:#fff;
  font-family:'Space Grotesk',sans-serif;
  font-weight:800;font-size:11px;
  padding:4px 8px;
  border-radius:12px 12px 12px 2px;
  box-shadow:0 3px 10px rgba(255,149,0,.4);
  white-space:nowrap;
  z-index:2;
}
/* big POW badge */
.hero-pow{
  font-family:'Space Grotesk',sans-serif;font-weight:800;
  font-size:52px;letter-spacing:-3px;
  color:transparent;
  -webkit-text-stroke:2.5px var(--violet);
  opacity:.08;
  position:absolute;
  right:16px;bottom:-8px;
  z-index:0;
  user-select:none;
  line-height:1;
}

<script>

let editId=null,curNote=0,curColor='#1B6EF3';

let dragSrc=null;

const COLORS=['#1B6EF3','#00B8D4','#FF4F6A','#22C55E','#FF6B00','#FF6B9D','#00C896','#FFD700','#F59E0B','#5B9BFF'];

const TE={Manga:'⛩️',BD:'🎨',Comics:'💥'};

// ── HERO ──
const SPINE_COLORS_HERO=['#1B6EF3','#FF4F6A','#FF6B00','#00B8D4','#22C55E','#FF6B9D','#5B9BFF','#FFD700','#00C896','#F59E0B'];
function updateHero(){
  const tomes=series.reduce((s,b)=>s+b.posses,0);
  const lu=series.reduce((s,b)=>s+(b.tomes_lus?.length||0),0);
  const val=series.reduce((s,b)=>s+(b.posses*(parseFloat(b.prix)||7)),0);
  const nonLus=tomes-lu;
  const pagesLues=series.reduce((acc,s)=>{const pp=s.pages||PAGES_DEF[s.type]||192;return acc+(pp*(s.tomes_lus?.length||0))},0);

  // subtitle
  const sub=document.getElementById('hero-sub');
  if(sub) sub.textContent=series.length
    ? `${series.length} série${series.length>1?'s':''} · ${tomes} tome${tomes>1?'s':''} · collection au top 🔥`
    : 'Ajoute ta première série !';

  // KPIs
  const kpis=document.getElementById('hero-kpis');
  if(kpis) kpis.innerHTML=[
    {icon:'📚',label:'Tomes',val:tomes},
    {icon:'📖',label:'Lus',val:lu},
    {icon:'🔖',label:'À lire',val:nonLus},
    {icon:'📄',label:'Pages',val:pagesLues>=1000?Math.round(pagesLues/1000)+'k':pagesLues},
    {icon:'💰',label:'Valeur',val:val.toFixed(0)+'€'},
  ].map(k=>`<div class="hero-kpi"><span class="hero-kpi-icon">${k.icon}</span><span style="color:var(--muted);font-weight:500">${k.label}</span><span class="hero-kpi-val">${k.val}</span></div>`).join('');

  // Book spines — top 7 series by tomes
  const stack=document.getElementById('hero-stack');
  if(!stack)return;
  const top=[...series].sort((a,b)=>b.posses-a.posses).slice(0,7);
  const heights=[82,96,72,108,88,76,100];
  const hasBubble=nonLus>0;
  stack.innerHTML=top.map((s,i)=>`
    <div class="hbook" style="height:${heights[i%heights.length]}px;background:${s.color||SPINE_COLORS_HERO[i%SPINE_COLORS_HERO.length]};margin-left:${i===0?0:-6}px"
      title="${s.nom} — ${s.posses} tomes" onclick="openDetail(${s.id})">
      <div class="hbook-num">${s.nom.substring(0,8)}</div>
      ${i===2&&hasBubble?`<div class="hero-bubble">📚 ${nonLus} à lire !</div>`:''}
    </div>`).join('');
}

// ── PAL helpers ──
function getPAL(){
  // Séries avec tomes possédés > tomes lus
  const pal=series.filter(s=>{
    const nonLus=s.posses-(s.tomes_lus?.length||0);
    return nonLus>0;
  });
  // Appliquer l'ordre personnalisé
  const ordered=[];
  palOrder.forEach(id=>{
    const s=pal.find(x=>x.id===id);
    if(s)ordered.push(s);
  });
  pal.forEach(s=>{if(!palOrder.includes(s.id))ordered.push(s)});
  return ordered;
}
function savePALOrder(arr){palOrder=arr.map(s=>s.id);save()}

// ── FILTERS ──
function setFilter(f,el){activeFilter=f;document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderAll()}
function setGenre(g){activeGenre=g;renderAll()}
function setAlpha(l){activeAlpha=l;renderAll()}
function onSearch(){document.getElementById('s-clear').style.display=document.getElementById('search').value?'block':'none';activeAlpha='';renderAll()}
function clearSearch(){document.getElementById('search').value='';document.getElementById('s-clear').style.display='none';renderAll()}
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  return series.filter(s=>{
    if(activeFilter!=='all'&&s.type!==activeFilter)return false;
    if(activeGenre&&s.genre!==activeGenre)return false;
    if(activeAlpha&&!s.nom.toUpperCase().startsWith(activeAlpha))return false;
    if(q&&!`${s.nom} ${s.auteur} ${s.genre} ${s.editeur}`.toLowerCase().includes(q))return false;
    return true;
  });
}
function getSorted(arr){
  const sv=document.getElementById('sort-by').value;
  return[...arr].sort((a,b)=>{
    if(sv==='alpha')return a.nom.localeCompare(b.nom,'fr');
    if(sv==='recent')return b.added-a.added;
    if(sv==='progress')return(b.posses/Math.max(b.total,1))-(a.posses/Math.max(a.total,1));
    if(sv==='score')return(b.note||0)-(a.note||0);
    if(sv==='tomes')return b.posses-a.posses;
    return 0;
  });
}
function hl(t,q){if(!q)return t;return t.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>')}
function pColor(pct,c){return pct>=100?'#6FD94A':(c||'#6C47FF')}

// ── RENDER ──
function renderAll(){
  updateSidebar();updateHero();buildAlpha();
  if(curView==='collection')renderCollection();
  else if(curView==='pal')renderPAL();
  else renderStats();
}

function updateSidebar(){
  const t=series.reduce((s,b)=>s+b.posses,0);
  const l=series.reduce((s,b)=>s+(b.tomes_lus?.length||0),0);
  const v=series.reduce((s,b)=>s+(b.posses*(parseFloat(b.prix)||7)),0);
  const palCount=getPAL().length;
  document.getElementById('sb-tomes').textContent=t;
  document.getElementById('sb-lu').textContent=l;
  document.getElementById('sb-val').textContent=v.toFixed(0)+'€';
  document.getElementById('nb-count').textContent=series.length;
  document.getElementById('nb-pal').textContent=palCount;
  const genres={};
  series.forEach(s=>{if(s.genre)genres[s.genre]=(genres[s.genre]||0)+1});
  document.getElementById('genre-list').innerHTML=
    `<button class="genre-pill${activeGenre===''?' active':''}" onclick="setGenre('')"><span>🎲 Tous</span><span class="genre-n">${series.length}</span></button>`
    +Object.entries(genres).sort((a,b)=>b[1]-a[1]).map(([g,n])=>
      `<button class="genre-pill${activeGenre===g?' active':''}" onclick="setGenre('${g}')"><span>${g}</span><span class="genre-n">${n}</span></button>`
    ).join('');
}

function buildAlpha(){
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const used=new Set(series.map(s=>s.nom[0]?.toUpperCase()));
  document.getElementById('alpha-bar').innerHTML=
    letters.map(l=>`<button class="alpha-btn${activeAlpha===l?' active':''}${!used.has(l)?' off':''}" onclick="setAlpha('${l}')">${l}</button>`).join('')
    +`<span class="alpha-sep"></span><button class="alpha-btn${activeAlpha===''?' active':''}" onclick="setAlpha('')" style="width:auto;padding:0 9px;font-size:10px">TOUT</button>`;
}

function renderCollection(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  const arr=getSorted(getFiltered());
  const el=document.getElementById('series-list');
  if(!arr.length){el.innerHTML=`<div class="empty"><span class="empty-ico">🔍</span><h3>Aucune série</h3><p>Modifie les filtres ou ajoute ta première série !</p><button class="btn-xs v" onclick="openAdd()" style="padding:10px 18px;font-size:13px;margin-top:4px">＋ Ajouter</button></div>`;return}
  const sv=document.getElementById('sort-by').value;
  if(sv==='alpha'&&!q&&!activeAlpha){
    const groups={};arr.forEach(s=>{const l=s.nom[0].toUpperCase();if(!groups[l])groups[l]=[];groups[l].push(s)});
    el.innerHTML=Object.keys(groups).sort().map(l=>`<div class="alpha-section-head">${l}</div>${groups[l].map(s=>scHTML(s,q)).join('')}`).join('');
  }else{el.innerHTML=arr.map(s=>scHTML(s,q)).join('')}
  el.querySelectorAll('.sc').forEach(card=>{if(expandedIds.has(parseInt(card.dataset.id)))card.classList.add('open')});
}

function scHTML(s,q=''){
  const pct=s.total>0?Math.min(100,Math.round(s.posses/s.total*100)):0;
  const pc=pColor(pct,s.color);
  const te=TE[s.type]||'📖';
  const coverHTML=s.cover
    ?`<div class="sc-cover"><img src="${s.cover}" alt="${s.nom}" onerror="this.parentElement.innerHTML='<div class=\\'sc-cover-ph\\' style=\\'background:${s.color}18\\'>${te}</div>'"></div>`
    :`<div class="sc-cover"><div class="sc-cover-ph" style="background:${s.color}18">${te}</div></div>`;
  const starRow=`<div class="sc-stars" onclick="event.stopPropagation()">${[1,2,3,4,5].map(v=>`<span class="sc-star${(s.note||0)>=v?' on':''}" onclick="rateSeries(${s.id},${v})">⭐</span>`).join('')}</div>`;
  const nonLus=s.posses-(s.tomes_lus?.length||0);
  return`<div class="sc${expandedIds.has(s.id)?' open':''}" data-id="${s.id}">
    <div class="sc-head" onclick="toggleCard(${s.id})">
      ${coverHTML}
      <div class="sc-info">
        <div class="sc-name">${hl(s.nom,q)}</div>
        <div class="sc-meta">
          <span class="type-tag ${s.type}">${s.type}</span>
          ${s.auteur?`<span class="sc-author">${hl(s.auteur,q)}</span>`:''}
          ${s.genre?`<span class="sc-genre">· ${s.genre}</span>`:''}
          ${s.statut?`<span style="font-size:11px;color:var(--muted)">${SICONS[s.statut]||''} ${s.statut}</span>`:''}
          ${nonLus>0?`<span style="font-size:10px;font-weight:700;color:var(--amber);background:var(--amber-light);padding:1px 6px;border-radius:5px">${nonLus} à lire</span>`:''}
        </div>
        <div class="sc-prog">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${pc}"></div></div>
          <div class="prog-label" style="color:${pc}">${s.posses}<span style="color:var(--muted);font-weight:400">/${s.total||'?'}</span></div>
        </div>
      </div>
      <div class="sc-right">${starRow}<span class="sc-chevron">▾</span></div>
    </div>
    <div class="sc-body">
      <div class="sc-body-label">Tomes · 1er clic = possédé · 2e = lu · 3e = retirer</div>
      <div class="tome-grid" id="tg-${s.id}">${buildTomes(s,new Set(s.tomes_lus||[]))}</div>
      <div class="sc-actions">
        <button class="btn-xs g" onclick="markAllOwned(${s.id})">✅ Tout posséder</button>
        <button class="btn-xs" onclick="markAllRead(${s.id})">📖 Tout lu</button>
        <button class="btn-xs v" onclick="openEdit(${s.id})">✏️ Modifier</button>
        <button class="btn-xs" onclick="openDetail(${s.id})">🔎 Détail</button>
        <button class="btn-xs d" onclick="delSeries(${s.id})">🗑️</button>
      </div>
      <div class="total-inline">
        <label>Total série :</label>
        <input class="total-input" type="number" value="${s.total||''}" min="1" placeholder="?" onchange="updateTotal(${s.id},this.value)">
        <span style="font-size:12px;color:var(--muted)">tomes</span>
        ${s.anneeVo?`<span style="margin-left:auto;font-size:11px;color:var(--muted)">VO ${s.anneeVo}${s.anneeVf?' · VF '+s.anneeVf:''}</span>`:''}
      </div>
    </div>
  </div>`;
}

function buildTomes(s,luSet){
  const total=s.total||s.posses;
  if(!total)return`<span style="font-size:12px;color:var(--muted)">Renseigne le total ci-dessous ↓</span>`;
  return Array.from({length:Math.min(total,80)},(_,i)=>{
    const n=i+1,owned=n<=s.posses,read=luSet.has(n);
    return`<div class="t${owned?' owned':''}${read?' read':''}" style="${owned?`background:${s.color};box-shadow:0 2px 6px ${s.color}55`:''}" title="${owned?read?'Clic: retirer':'Clic: lu':'Clic: ajouter'}" onclick="toggleTome(event,${s.id},${n})">${n}</div>`;
  }).join('')+(total>80?`<span style="font-size:11px;color:var(--muted);padding:4px 8px">+${total-80}</span>`:'');
}

// ── PAL VIEW ──
function renderPAL(){
  const pal=getPAL();
  const el=document.getElementById('pal-list');
  document.getElementById('pal-sub').textContent=`${pal.length} série${pal.length>1?'s':''} avec des tomes non lus · Glisse pour réordonner · ou tape le numéro`;
  if(!pal.length){
    el.innerHTML=`<div class="empty"><span class="empty-ico">🎉</span><h3>Pile vide !</h3><p>Tous tes tomes possédés sont lus. Bravo !</p></div>`;
    return;
  }
  el.innerHTML=pal.map((s,i)=>{
    const nonLus=s.posses-(s.tomes_lus?.length||0);
    const tc=TC[s.type]||'#888';
    const rankClass=i===0?'r1':i===1?'r2':i===2?'r3':'';
    return`<div class="pal-item" data-id="${s.id}" draggable="true"
      ondragstart="palDragStart(event,${s.id})"
      ondragover="palDragOver(event)"
      ondrop="palDrop(event,${s.id})"
      ondragend="palDragEnd()">
      <div class="pal-drag-handle">⠿</div>
      <div class="pal-rank ${rankClass}">${i+1}</div>
      <div class="pal-cover" style="background:${s.color}18">${TE[s.type]||'📖'}</div>
      <div class="pal-info">
        <div class="pal-name">${s.nom}</div>
        <div class="pal-meta">${s.type}${s.auteur?' · '+s.auteur:''} ${s.note?'· '+'⭐'.repeat(s.note):''}</div>
      </div>
      <div class="pal-unread" style="background:${s.color}18;color:${s.color}">${nonLus} tome${nonLus>1?'s':''} à lire</div>
      <input class="pal-rank-input" type="number" min="1" max="${pal.length}" value="${i+1}"
        title="Changer la position" onchange="palReorder(${s.id},parseInt(this.value)-1,${pal.length})" onclick="event.stopPropagation()">
    </div>`;
  }).join('');
  // bind drag events
  el.querySelectorAll('.pal-item').forEach(item=>{
    item.addEventListener('dragstart',e=>palDragStart(e,parseInt(item.dataset.id)));
    item.addEventListener('dragover',palDragOver);
    item.addEventListener('drop',e=>palDrop(e,parseInt(item.dataset.id)));
    item.addEventListener('dragend',palDragEnd);
  });
}

function palDragStart(e,id){dragSrc=id;e.currentTarget.classList.add('dragging')}
function palDragOver(e){e.preventDefault();e.currentTarget.classList.add('drag-over')}
function palDragEnd(){document.querySelectorAll('.pal-item').forEach(i=>{i.classList.remove('dragging','drag-over')});dragSrc=null}
function palDrop(e,targetId){
  e.preventDefault();e.currentTarget.classList.remove('drag-over');
  if(dragSrc===null||dragSrc===targetId)return;
  const pal=getPAL();
  const srcIdx=pal.findIndex(s=>s.id===dragSrc);
  const tgtIdx=pal.findIndex(s=>s.id===targetId);
  if(srcIdx<0||tgtIdx<0)return;
  const arr=[...pal];const[moved]=arr.splice(srcIdx,1);arr.splice(tgtIdx,0,moved);
  savePALOrder(arr);renderPAL();
  toast('↕️ Ordre mis à jour',null);
}
function palReorder(id,newIdx,len){
  const pal=getPAL();
  const curIdx=pal.findIndex(s=>s.id===id);
  if(curIdx<0)return;
  newIdx=Math.max(0,Math.min(len-1,newIdx));
  const arr=[...pal];const[moved]=arr.splice(curIdx,1);arr.splice(newIdx,0,moved);
  savePALOrder(arr);renderPAL();
  toast(`📌 Placé en position ${newIdx+1}`,null);
}

// ── INTERACTIONS ──
function toggleCard(id){
  if(expandedIds.has(id))expandedIds.delete(id);else expandedIds.add(id);
  const card=document.querySelector(`.sc[data-id="${id}"]`);
  if(card){card.classList.toggle('open');if(expandedIds.has(id))setTimeout(()=>card.scrollIntoView({block:'nearest',behavior:'smooth'}),50)}
}
function rateSeries(id,note){
  const s=series.find(x=>x.id===id);if(!s)return;
  s.note=s.note===note?0:note;save();
  const card=document.querySelector(`.sc[data-id="${id}"]`);
  if(card)card.querySelectorAll('.sc-star').forEach(star=>{star.classList.toggle('on',parseInt(star.getAttribute('onclick').match(/,(\d+)\)/)[1])<=(s.note||0))});
  updateSidebar();toast(`${s.note?'⭐'.repeat(s.note)+' noté !':'Note retirée'}`,s.color);
}
function toggleTome(e,sid,tome){
  e.stopPropagation();
  const s=series.find(x=>x.id===sid);if(!s)return;
  if(!s.tomes_lus)s.tomes_lus=[];
  const luSet=new Set(s.tomes_lus);
  if(tome>s.posses){s.posses=tome;toast(`📗 Tome ${tome} ajouté !`,s.color);confetti(e.clientX,e.clientY,s.color)}
  else if(!luSet.has(tome)){luSet.add(tome);s.tomes_lus=[...luSet].sort((a,b)=>a-b);toast(`📖 Tome ${tome} lu !`,s.color)}
  else{if(tome===s.posses)s.posses=Math.max(0,tome-1);luSet.delete(tome);s.tomes_lus=[...luSet].sort((a,b)=>a-b);toast(`↩️ Tome ${tome} retiré`,null)}
  save();
  const tg=document.getElementById(`tg-${sid}`);
  if(tg)tg.innerHTML=buildTomes(s,new Set(s.tomes_lus));
  renderAll();
}
function markAllOwned(sid){const s=series.find(x=>x.id===sid);if(!s||!s.total)return;s.posses=s.total;save();toast(`✅ Collection complète — ${s.nom}!`,s.color);confetti(window.innerWidth/2,200,s.color);renderAll()}
function markAllRead(sid){const s=series.find(x=>x.id===sid);if(!s)return;s.tomes_lus=Array.from({length:s.posses},(_,i)=>i+1);save();toast(`📚 Tout lu !`,s.color);renderAll()}
function updateTotal(sid,val){const s=series.find(x=>x.id===sid);if(!s)return;s.total=parseInt(val)||s.total;save();renderAll()}

// ── ADD/EDIT ──
function buildColorRow(){document.getElementById('color-row').innerHTML=COLORS.map(c=>`<div class="cswatch${c===curColor?' sel':''}" style="background:${c}" onclick="selColor('${c}',this)"></div>`).join('')}
function selColor(c,el){curColor=c;document.querySelectorAll('.cswatch').forEach(d=>d.classList.remove('sel'));el.classList.add('sel')}
function setupStars(){document.querySelectorAll('#stars-big .star-big').forEach(s=>{s.classList.toggle('on',parseInt(s.dataset.v)<=curNote);s.onclick=()=>{curNote=parseInt(s.dataset.v)===curNote?0:parseInt(s.dataset.v);setupStars()}})}

function toggleComicsFields(){
  const isComics=document.getElementById('f-type').value==='Comics';
  document.getElementById('f-editeur-vo-wrap').style.display=isComics?'block':'none';
}
document.getElementById('f-type').addEventListener('change',toggleComicsFields);

function openAdd(){
  editId=null;curNote=0;curColor='#1B6EF3';
  ['nom','auteur','dessinateur','genre','editeur','editeur-vo','annee-vo','annee-vf','total','posses','prix','pages','poids','cover','notes'].forEach(f=>{const el=document.getElementById('f-'+f);if(el)el.value=''});

}
function openEdit(id){
  closeModal('modal-detail');
  const s=series.find(x=>x.id===id);if(!s)return;
  editId=id;curNote=s.note||0;curColor=s.color||'#6C47FF';
  document.getElementById('f-nom').value=s.nom||'';
  document.getElementById('f-auteur').value=s.auteur||'';
  document.getElementById('f-dessinateur').value=s.dessinateur||'';
  document.getElementById('f-type').value=s.type||'Manga';
  document.getElementById('f-genre').value=s.genre||'';
  document.getElementById('f-editeur').value=s.editeur||'';
  document.getElementById('f-editeur-vo').value=s.editeurVo||'';
  document.getElementById('f-annee-vo').value=s.anneeVo||'';
  document.getElementById('f-annee-vf').value=s.anneeVf||'';
  document.getElementById('f-total').value=s.total||'';
  document.getElementById('f-posses').value=s.posses||'';
  document.getElementById('f-prix').value=s.prix||'';
  document.getElementById('f-pages').value=s.pages||'';
  document.getElementById('f-poids').value=s.poids||'';
  document.getElementById('f-cover').value=s.cover||'';
  document.getElementById('f-statut').value=s.statut||'en cours';
  document.getElementById('f-notes').value=s.notes||'';
  document.getElementById('modal-add-title').textContent='Modifier la série';
  toggleComicsFields();buildColorRow();setupStars();openModal('modal-add');

function saveSeries(){
  const nom=document.getElementById('f-nom').value.trim();
  if(!nom){toast('❗ Nom obligatoire','#FF4F6A');return}
  const posses=parseInt(document.getElementById('f-posses').value)||0;
  const total=parseInt(document.getElementById('f-total').value)||posses;
  const prev=editId?series.find(x=>x.id===editId):{};
  const type=document.getElementById('f-type').value;
  const s={
    id:editId||(Date.now()+Math.random()),nom,
    auteur:document.getElementById('f-auteur').value.trim(),
    dessinateur:document.getElementById('f-dessinateur').value.trim(),
    type,
    genre:document.getElementById('f-genre').value.trim(),
    editeur:document.getElementById('f-editeur').value.trim(),
    editeurVo:document.getElementById('f-editeur-vo').value.trim(),
    anneeVo:parseInt(document.getElementById('f-annee-vo').value)||null,
    anneeVf:parseInt(document.getElementById('f-annee-vf').value)||null,
    total,posses,
    prix:parseFloat(document.getElementById('f-prix').value)||null,
    pages:parseInt(document.getElementById('f-pages').value)||PAGES_DEF[type]||192,
    poids:parseInt(document.getElementById('f-poids').value)||POIDS_DEF[type]||185,
    cover:document.getElementById('f-cover').value.trim(),
    color:curColor,note:curNote,
    statut:document.getElementById('f-statut').value,
    notes:document.getElementById('f-notes').value.trim(),
    tomes_lus:prev.tomes_lus||[],
    added:prev.added||Date.now()
  };
  if(editId){const i=series.findIndex(x=>x.id===editId);series[i]=s}
  else{series.unshift(s);confetti(window.innerWidth/2,150,curColor)}
  save();closeModal('modal-add');renderAll();
  toast(editId?'✏️ Série modifiée !':'🎉 Ajoutée !',curColor);
}
function delSeries(id){if(!confirm('Supprimer ?'))return;series=series.filter(x=>x.id!==id);palOrder=palOrder.filter(x=>x!==id);save();renderAll();toast('🗑️ Supprimée','#FF4F6A')}

// ── DETAIL ──

  const pc=pColor(pct,s.color);
  const lu=s.tomes_lus?.length||0;
  const val=(s.posses*(parseFloat(s.prix)||7)).toFixed(2);
  const pagesTotal=(s.pages||PAGES_DEF[s.type]||192)*lu;
  const poidsTotal=(s.poids||POIDS_DEF[s.type]||185)*s.posses;
  const isComics=s.type==='Comics';
  document.getElementById('d-title').textContent=s.nom;
  document.getElementById('d-body').innerHTML=`
    <div class="detail-cover-wrap" style="background:${s.color}18">
      ${s.cover?`<img src="${s.cover}" alt="${s.nom}">`:`<span style="font-size:68px">${TE[s.type]||'📖'}</span>`}
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
      <span class="type-tag ${s.type}">${s.type}</span>

    </div>

      ${s.editeurVo?`<span class="vo-vf-badge vo-badge">🌐 VO : ${s.editeurVo}</span>`:''}

    </div>`:''}
    <div class="detail-grid">
      ${s.auteur?`<div class="detail-cell"><div class="detail-cell-label">Scénariste</div><div class="detail-cell-val">${s.auteur}</div></div>`:''}
      ${s.dessinateur&&s.dessinateur!==s.auteur?`<div class="detail-cell"><div class="detail-cell-label">Dessinateur</div><div class="detail-cell-val">${s.dessinateur}</div></div>`:''}

      ${isComics&&s.editeurVo?`<div class="detail-cell"><div class="detail-cell-label">Éditeur VO</div><div class="detail-cell-val">${s.editeurVo}</div></div>`:''}
      ${s.anneeVo?`<div class="detail-cell"><div class="detail-cell-label">Année VO</div><div class="detail-cell-val">${s.anneeVo}</div></div>`:''}
      ${s.anneeVf?`<div class="detail-cell"><div class="detail-cell-label">Année VF</div><div class="detail-cell-val">${s.anneeVf}</div></div>`:''}
      ${s.genre?`<div class="detail-cell"><div class="detail-cell-label">Genre</div><div class="detail-cell-val">${s.genre}</div></div>`:''}
      <div class="detail-cell"><div class="detail-cell-label">Progression</div><div class="detail-cell-val" style="color:${pc}">${s.posses}/${s.total||'?'} <span style="font-size:12px;color:var(--muted)">(${pct}%)</span></div></div>
      <div class="detail-cell"><div class="detail-cell-label">Tomes lus</div><div class="detail-cell-val">${lu} <span style="font-size:11px;color:var(--muted)">/ ${s.posses}</span></div></div>
      <div class="detail-cell"><div class="detail-cell-label">Pages lues</div><div class="detail-cell-val" style="color:var(--violet)">${pagesTotal.toLocaleString('fr')}<div class="detail-cell-sub">${s.pages||PAGES_DEF[s.type]} p/tome</div></div></div>

// ── STATS ──
function switchView(v,el){
  curView=v;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  ['view-collection','view-pal','view-stats'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('view-'+v).style.display='block';
  if(v==='stats')renderStats();
  else if(v==='pal')renderPAL();
  else renderCollection();
}

function renderStats(){
  const tot=series.length;
  const tomes=series.reduce((s,b)=>s+b.posses,0);
  const lu=series.reduce((s,b)=>s+(b.tomes_lus?.length||0),0);
  const manq=series.reduce((s,b)=>s+Math.max(0,(b.total||b.posses)-b.posses),0);
  const val=series.reduce((s,b)=>s+(b.posses*(parseFloat(b.prix)||7)),0);
  const noted=series.filter(b=>b.note);
  const avg=noted.length?(noted.reduce((s,b)=>s+b.note,0)/noted.length).toFixed(1):'—';
  const compl=series.filter(b=>b.statut==='complete').length;
  const pctLu=tomes?Math.round(lu/tomes*100):0;
  // Pages lues totales
  const pagesLues=series.reduce((acc,s)=>{const pp=s.pages||PAGES_DEF[s.type]||192;return acc+pp*(s.tomes_lus?.length||0)},0);
  // Poids total possédé
  const poidsTot=series.reduce((acc,s)=>{const pg=s.poids||POIDS_DEF[s.type]||185;return acc+pg*s.posses},0);
  const palCount=getPAL().length;

  const byType={};series.forEach(s=>{byType[s.type]=(byType[s.type]||0)+1});
  const byGenre={};series.forEach(s=>{if(s.genre)byGenre[s.genre]=(byGenre[s.genre]||0)+1});
  const typeColors={Manga:'#8B6FFF',BD:'#00B8D4',Comics:'#FF4F6A'};
  const gc=['#6C47FF','#00B8D4','#FF4F6A','#6FD94A','#FF9500','#FF6B9D','#00C896','#FFD700'];

  document.getElementById('stats-hero').innerHTML=`
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--violet)"></div><div class="stat-card-icon">🗂️</div><div class="stat-card-val" style="color:var(--violet)">${tot}</div><div class="stat-card-label">Séries</div><div class="stat-card-sub" style="color:var(--acid)">${compl} complètes</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:#8B6FFF"></div><div class="stat-card-icon">📚</div><div class="stat-card-val" style="color:#5B9BFF">${tomes}</div><div class="stat-card-label">Tomes possédés</div><div class="stat-card-sub" style="color:var(--muted)">${lu} lus (${pctLu}%)</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--coral)"></div><div class="stat-card-icon">🔍</div><div class="stat-card-val" style="color:var(--coral)">${manq}</div><div class="stat-card-label">Tomes manquants</div><div class="stat-card-sub" style="color:var(--muted)">à compléter</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--amber)"></div><div class="stat-card-icon">💰</div><div class="stat-card-val" style="color:var(--amber)">${val.toFixed(0)}€</div><div class="stat-card-label">Valeur</div><div class="stat-card-sub" style="color:var(--muted)">${tomes?(val/tomes).toFixed(2):0}€/tome</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--acid)"></div><div class="stat-card-icon">📄</div><div class="stat-card-val" style="color:var(--acid)">${pagesLues>=1000?Math.round(pagesLues/1000)+'k':pagesLues}</div><div class="stat-card-label">Pages lues</div><div class="stat-card-sub" style="color:var(--muted)">${pagesLues>=1000?pagesLues.toLocaleString('fr')+' pages':''}</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--cyan)"></div><div class="stat-card-icon">⚖️</div><div class="stat-card-val" style="color:var(--cyan)">${poidsTot>=1000?(poidsTot/1000).toFixed(1)+'<span style="font-size:18px">kg</span>':(poidsTot+'<span style="font-size:18px">g</span>')}</div><div class="stat-card-label">Poids collection</div><div class="stat-card-sub" style="color:var(--muted)">${poidsTot>=1000?poidsTot.toLocaleString('fr')+'g':''}</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--pink)"></div><div class="stat-card-icon">⭐</div><div class="stat-card-val" style="color:var(--pink)">${avg}</div><div class="stat-card-label">Note moyenne</div><div class="stat-card-sub" style="color:var(--muted)">${noted.length} notées</div></div>
    <div class="stat-card"><div class="stat-card-stripe" style="background:var(--amber)"></div><div class="stat-card-icon">🔖</div><div class="stat-card-val" style="color:var(--amber)">${palCount}</div><div class="stat-card-label">Pile à lire</div><div class="stat-card-sub" style="color:var(--muted)">${tomes-lu} tomes non lus</div></div>
  `;

  const maxG=Math.max(...Object.values(byGenre),1);
  const topG=Object.entries(byGenre).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const R=40,C=2*Math.PI*R;
  const typeE=Object.entries(byType);let off=0;
  const dpaths=typeE.map(([t,n])=>{const c=typeColors[t]||'#888',d=n/tot*C,p=`<circle r="${R}" cx="54" cy="54" fill="none" stroke="${c}" stroke-width="18" stroke-dasharray="${d} ${C-d}" stroke-dashoffset="${-off}" transform="rotate(-90 54 54)" stroke-linecap="round"/>`;off+=d;return{p,c,t,n}});
  const top5t=getSorted([...series]).filter(s=>s.posses>0).slice(0,5);
  const top5n=[...series].filter(s=>s.note).sort((a,b)=>b.note-a.note).slice(0,5);
  const rc=['r1','r2','r3','',''];
  const withTotal=series.filter(s=>s.total>0).sort((a,b)=>(b.posses/b.total)-(a.posses/a.total));
  // Top pages
  const topPages=[...series].sort((a,b)=>{const pa=(a.pages||PAGES_DEF[a.type]||192)*(a.tomes_lus?.length||0);const pb=(b.pages||PAGES_DEF[b.type]||192)*(b.tomes_lus?.length||0);return pb-pa}).slice(0,5);

  document.getElementById('charts-grid').innerHTML=`
    <div class="chart-box">
      <div class="chart-box-title">Par genre</div>
      ${topG.map(([g,n],i)=>`<div class="bar-row"><div class="bar-label">${g}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(n/maxG*100)}%;background:${gc[i%gc.length]}"></div></div><div class="bar-n">${n}</div></div>`).join('')}
    </div>
    <div class="chart-box">
      <div class="chart-box-title">Par type</div>
      <div class="donut-wrap">
        <svg viewBox="0 0 108 108" width="120" height="120">
          <circle r="${R}" cx="54" cy="54" fill="none" stroke="var(--surface2)" stroke-width="18"/>
          ${dpaths.map(x=>x.p).join('')}
          <text x="54" y="50" text-anchor="middle" fill="var(--ink)" font-family="Space Grotesk,sans-serif" font-weight="800" font-size="16">${tot}</text>
          <text x="54" y="63" text-anchor="middle" fill="var(--muted)" font-family="DM Sans,sans-serif" font-size="8">séries</text>
        </svg>
        <div class="donut-legend">
          ${dpaths.map(x=>`<div class="dleg"><div class="dleg-sq" style="background:${x.c}"></div><span>${x.t}</span><span class="dleg-pct">${x.n} · ${Math.round(x.n/tot*100)}%</span></div>`).join('')}
        </div>
      </div>
    </div>
    <div class="chart-box">
      <div class="chart-box-title">🏆 Top — Tomes possédés</div>
      ${top5t.map((s,i)=>`<div class="top-row"><div class="top-rank ${rc[i]}">${i+1}</div><div class="top-info"><div class="top-name">${s.nom}</div><div class="top-sub">${s.type} · ${s.posses} tomes</div></div><div class="top-val">${s.note?'⭐'.repeat(s.note):''}</div></div>`).join('')}
    </div>
    <div class="chart-box">
      <div class="chart-box-title">📄 Top — Pages lues</div>
      ${topPages.map((s,i)=>{const p=(s.pages||PAGES_DEF[s.type]||192)*(s.tomes_lus?.length||0);return`<div class="top-row"><div class="top-rank ${rc[i]}">${i+1}</div><div class="top-info"><div class="top-name">${s.nom}</div><div class="top-sub">${(s.tomes_lus?.length||0)} tomes lus</div></div><div class="top-val">${p.toLocaleString('fr')} p.</div></div>`}).join('')}
    </div>
    <div class="chart-box">
      <div class="chart-box-title">⭐ Top — Meilleures notes</div>
      ${top5n.map((s,i)=>`<div class="top-row"><div class="top-rank ${rc[i]}">${i+1}</div><div class="top-info"><div class="top-name">${s.nom}</div><div class="top-sub">${s.auteur||s.type}</div></div><div class="top-val">${s.note}⭐</div></div>`).join('')}
    </div>
    <div class="chart-box">
      <div class="chart-box-title">⚖️ Top — Plus lourd</div>
      ${[...series].sort((a,b)=>{return(b.posses*(b.poids||POIDS_DEF[b.type]||185))-(a.posses*(a.poids||POIDS_DEF[a.type]||185))}).slice(0,5).map((s,i)=>{const p=s.posses*(s.poids||POIDS_DEF[s.type]||185);return`<div class="top-row"><div class="top-rank ${rc[i]}">${i+1}</div><div class="top-info"><div class="top-name">${s.nom}</div><div class="top-sub">${s.posses} tomes · ${s.poids||POIDS_DEF[s.type]}g/tome</div></div><div class="top-val">${p>=1000?(p/1000).toFixed(1)+'kg':p+'g'}</div></div>`}).join('')}
    </div>
    <div class="chart-box full">
      <div class="chart-box-title">📊 Complétion des séries</div>
      <div class="comp-grid">
        ${withTotal.map(s=>{const pct=Math.round(s.posses/s.total*100),c=pColor(pct,s.color);return`<div class="comp-row"><div class="comp-name" title="${s.nom}">${s.nom}</div><div class="comp-bar"><div class="comp-fill" style="width:${pct}%;background:${c}"></div></div><div class="comp-pct" style="color:${c}">${pct}%</div></div>`}).join('')}
      </div>
    </div>
  `;
}

// ── IMPORT/EXPORT ──
function exportData(){
  const blob=new Blob([JSON.stringify({series,palOrder},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`inkbox_${new Date().toISOString().slice(0,10)}.json`;a.click();
  toast('📤 Export téléchargé !','#1B6EF3');
}
function openImport(){openModal('modal-import')}
function doImport(){
  try{
    const raw=JSON.parse(document.getElementById('import-json').value);
    const data=Array.isArray(raw)?raw:(raw.series||[]);
    const ids=new Set(series.map(s=>s.id));
    let n=0;data.forEach(s=>{if(s.nom&&!ids.has(s.id)){series.unshift(s);n++}});
    if(raw.palOrder)palOrder=raw.palOrder;
    save();closeModal('modal-import');renderAll();
    toast(`✅ ${n} série(s) importée(s)`,n>0?'#6FD94A':'#FF4F6A');
  }catch{toast('❗ JSON invalide','#FF4F6A')}
}

// ── CONFETTI ──
function confetti(x,y,color){
  const cs=[color,'#6C47FF','#6FD94A',color+'88','#F0EEF8'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');el.className='cf';const sz=5+Math.random()*8;
    el.style.cssText=`left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;background:${cs[i%cs.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${.7+Math.random()*.9}s;animation-delay:${Math.random()*.15}s;margin-left:${(Math.random()-.5)*140}px`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1800);
  }
}

// ── MODAL ──
function openModal(id){document.getElementById(id).classList.add('open')}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function closeOv(e,id){if(e.target===document.getElementById(id))closeModal(id)}

// ── TOAST ──
function toast(msg,color){
  const t=document.getElementById('toast'),s=document.getElementById('toast-stripe');
  document.getElementById('toast-msg').textContent=msg;
  s.style.background=color||'var(--violet)';s.style.display=color?'block':'none';
  t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')['modal-add','modal-detail','modal-import'].forEach(closeModal);
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('search').focus()}
  if((e.metaKey||e.ctrlKey)&&e.key==='n'){e.preventDefault();openAdd()}
});


function updateBottomNav(v){
  ['col','pal','stats'].forEach(id=>{
    const el=document.getElementById('bn-'+id);
    if(el) el.classList.toggle('active', id===v);
  });
}

// ── INIT ──
load();
if(!series.length)demo();
renderAll();
</script>
